# freee-mcp-solo 設定ファイル
# ~/.config/freee-mcp-solo/config.yaml にコピーして編集してください

# ── freee API 認証情報 ──
# freee 開発者ページ (https://app.secure.freee.co.jp/developers) でアプリを作成し、
# client_id と client_secret を取得してください。
# コールバックURL: http://127.0.0.1:54321/callback
auth:
  client_id: ""       # freee アプリの Client ID
  client_secret: ""   # freee アプリの Client Secret
  callback_port: 54321
  # company_id と company_name は初回認証時に自動設定されます
  # company_id: ""
  # company_name: ""

# 振込先情報（請求書に記載される）
payment:
  bank_info: "○○銀行 △△支店 普通 1234567 カ）サンプル"

# 請求書のデフォルト設定
invoice:
  tax_entry_method: exclusive  # exclusive(外税) / inclusive(内税)
  default_account_item: "売上高"
  default_tax_code_name: "課税売上10%"
  layout: default_classic
  message: "下記の通りご請求申し上げます。"
  notes: ""

# 取引先ごとの設定
# キーはfreeeに登録された取引先名と一致させてください
partners:
  株式会社サンプル:
    due_date_rule: "+1month_end"  # 翌月末
    partner_title: "御中"
    subject_template: "開発費_{YY}年{MM}月"

  # 別の取引先の例
  # 株式会社ABC:
  #   due_date_rule: "+2months_15"  # 翌々月15日
  #   partner_title: "御中"
  #   subject_template: "コンサルティング_{YYYY}年{M}月"

# ── due_date_rule の書式 ──
#   "+1month_end"    → 翌月末日
#   "+2months_15"    → 翌々月15日
#   "+1month_20"     → 翌月20日
#   "+30days"        → 30日後

# ── subject_template の変数 ──
#   {YYYY}  → 4桁の年（例: 2026）
#   {YY}    → 2桁の年（例: 26）
#   {MM}    → 2桁の月（例: 03）
#   {M}     → 月（例: 3）
