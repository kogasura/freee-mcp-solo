<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Calculator/ledger icon -->
  <g transform="translate(470, 60)">
    <!-- Main body -->
    <rect x="0" y="0" width="260" height="240" rx="16" fill="none" stroke="#a78bfa" stroke-width="4"/>
    <!-- Screen area -->
    <rect x="20" y="20" width="220" height="60" rx="8" fill="#a78bfa" opacity="0.15"/>
    <!-- Amount display -->
    <text x="220" y="62" text-anchor="end" font-family="monospace" font-weight="700" font-size="32" fill="#a78bfa">¥ 120,000</text>
    <!-- Keypad dots -->
    <circle cx="65" cy="120" r="12" fill="#a78bfa" opacity="0.3"/>
    <circle cx="130" cy="120" r="12" fill="#a78bfa" opacity="0.3"/>
    <circle cx="195" cy="120" r="12" fill="#a78bfa" opacity="0.3"/>
    <circle cx="65" cy="165" r="12" fill="#a78bfa" opacity="0.3"/>
    <circle cx="130" cy="165" r="12" fill="#a78bfa" opacity="0.3"/>
    <circle cx="195" cy="165" r="12" fill="#a78bfa" opacity="0.3"/>
    <circle cx="65" cy="210" r="12" fill="#a78bfa" opacity="0.3"/>
    <circle cx="130" cy="210" r="12" fill="#a78bfa" opacity="0.3"/>
    <circle cx="195" cy="210" r="12" fill="#22c55e" opacity="0.6"/>
  </g>

  <!-- Title -->
  <text x="600" y="410" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="64" fill="white">freee-mcp-solo</text>

  <!-- Tagline -->
  <text x="600" y="475" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="24" fill="#94a3b8">個人事業主・フリーランスの日常経理に特化した</text>
  <text x="600" y="510" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="24" fill="#94a3b8">freee会計 MCP サーバー</text>

  <!-- Badge -->
  <rect x="480" y="540" width="240" height="36" rx="18" fill="#a78bfa" opacity="0.15"/>
  <text x="600" y="565" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="18" fill="#a78bfa">MCP Server  ·  npm</text>
</svg>
